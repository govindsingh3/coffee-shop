version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=3000
      - SPRING_DATA_MONGODB_URI=mongodb+srv://govinddb:govind123@cluster0.ngh7mbh.mongodb.net/
      - MONGO_URI=mongodb+srv://govinddb:govind123@cluster0.ngh7mbh.mongodb.net/
    networks:
      - coffee-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - coffee-network

volumes:
  mongodb_data:

networks:
  coffee-network:
    driver: bridge
